name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.platform }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: windows_amd64
            platform: windows
            os: windows-latest
            asset: dist/*.zip
          - package: darwin_amd64
            platform: macos
            os: macos-15-intel
            asset: dist/*.tar.gz
          - package: darwin_arm64
            platform: macos
            os: macos-15
            asset: dist/*.tar.gz
          - package: linux_amd64
            platform: linux
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            asset: dist/*.tar.gz
          - package: linux_arm64
            platform: linux
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            asset: dist/*.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.platform == 'linux'
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux musl toolchain
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build package
        run: node scripts/package-release.mjs
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.1.0' }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_PACKAGE_SUFFIX: ${{ matrix.package }}
          RELEASE_CARGO_TARGET: ${{ matrix.rust_target }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
